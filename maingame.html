<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Классические шашки</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: #333;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        
        h1 {
            color: #8B4513;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            font-size: 5vw;
            text-align: center;
        }
        
        .game-info {
            margin-bottom: 15px;
            text-align: center;
            background-color: #f8f8f8;
            padding: 8px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 3.5vw;
            width: 90%;
            max-width: 500px;
        }
        
        .board-container {
            width: 90vw;
            height: 90vw;
            max-width: 500px;
            max-height: 500px;
            margin: 0 auto;
            position: relative;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 8px solid #8B4513;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-radius: 5px;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        
        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .light {
            background-color: #f0d9b5;
        }
        
        .dark {
            background-color: #b58863;
        }
        
        .piece {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            cursor: pointer;
        }
        
        .piece:hover {
            transform: scale(1.05);
        }
        
        .player {
            background: radial-gradient(circle at 30% 30%, #fff, #d00);
            border: 2px solid #a00;
        }
        
        .ai {
            background: radial-gradient(circle at 30% 30%, #fff, #000);
            border: 2px solid #333;
        }
        
        .king::after {
            content: "♔";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5vw;
            color: gold;
            text-shadow: 0 0 2px black;
        }
        
        .selected {
            box-shadow: 0 0 0 3px gold, 0 3px 5px rgba(0,0,0,0.3);
        }
        
        .valid-move::before {
            content: "";
            position: absolute;
            width: 30%;
            height: 30%;
            background-color: rgba(0, 255, 0, 0.5);
            border-radius: 50%;
            z-index: 1;
        }
        
        .capture-move::before {
            content: "";
            position: absolute;
            width: 40%;
            height: 40%;
            background-color: rgba(255, 0, 0, 0.5);
            border-radius: 50%;
            z-index: 1;
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
            max-width: 500px;
        }
        
        button {
            padding: 12px 20px;
            background-color: #8B4513;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 4vw;
            transition: background-color 0.2s;
            min-width: 120px;
        }
        
        button:hover {
            background-color: #A0522D;
        }
        
        .status {
            margin-top: 15px;
            font-size: 4vw;
            font-weight: bold;
            min-height: 27px;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        
        .thinking {
            color: #8B4513;
            font-style: italic;
        }
        
        .rules-info {
            margin-top: 10px;
            font-size: 3vw;
            color: #666;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        
        /* Медиа-запросы для больших экранов */
        @media (min-width: 768px) {
            h1 {
                font-size: 24px;
            }
            
            .game-info {
                font-size: 16px;
            }
            
            button {
                font-size: 16px;
            }
            
            .status {
                font-size: 18px;
            }
            
            .king::after {
                font-size: 20px;
            }
            
            .rules-info {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <h1>Классические шашки</h1>
    
    <div class="game-info">
        <p>Вы играете красными шашками. Ходите первыми.</p>
    </div>
    
    <div class="board-container">
        <div class="board" id="board"></div>
    </div>
    
    <div class="status" id="status">Ваш ход</div>
    
    <div class="rules-info" id="rulesInfo"></div>
    
    <div class="controls">
        <button id="restart">Новая игра</button>
        <button id="undo">Отменить ход</button>
    </div>

    <script>
        // Константы игры
        const PLAYER = 1;
        const AI = 2;
        const EMPTY = 0;
        
        // Состояние игры
        let board = [];
        let currentPlayer = PLAYER;
        let selectedPiece = null;
        let validMoves = [];
        let moveHistory = [];
        let mustCapture = false;
        
        // Элементы DOM
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const rulesInfoElement = document.getElementById('rulesInfo');
        const restartButton = document.getElementById('restart');
        const undoButton = document.getElementById('undo');
        
        // Инициализация игры
        function initGame() {
            // Создаем начальную доску
            board = Array(8).fill().map(() => Array(8).fill(EMPTY));
            
            // Расставляем шашки
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) {
                        if (row < 3) {
                            board[row][col] = {player: AI, king: false};
                        } else if (row > 4) {
                            board[row][col] = {player: PLAYER, king: false};
                        }
                    }
                }
            }
            
            currentPlayer = PLAYER;
            selectedPiece = null;
            validMoves = [];
            moveHistory = [];
            mustCapture = false;
            
            renderBoard();
            updateStatus();
        }
        
        // Отрисовка доски
        function renderBoard() {
            boardElement.innerHTML = '';
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    // Добавляем обработчик клика
                    cell.addEventListener('click', () => handleCellClick(row, col));
                    
                    // Добавляем шашку, если она есть
                    const piece = board[row][col];
                    if (piece !== EMPTY) {
                        const pieceElement = document.createElement('div');
                        pieceElement.className = `piece ${piece.player === PLAYER ? 'player' : 'ai'} ${piece.king ? 'king' : ''}`;
                        
                        // Если эта шашка выбрана, добавляем класс selected
                        if (selectedPiece && selectedPiece.row === row && selectedPiece.col === col) {
                            pieceElement.classList.add('selected');
                        }
                        
                        cell.appendChild(pieceElement);
                    }
                    
                    // Если это допустимый ход, добавляем индикатор
                    const moveToThisCell = validMoves.find(move => move.toRow === row && move.toCol === col);
                    if (moveToThisCell) {
                        if (moveToThisCell.capture) {
                            cell.classList.add('capture-move');
                        } else {
                            cell.classList.add('valid-move');
                        }
                    }
                    
                    boardElement.appendChild(cell);
                }
            }
        }
        
        // Обновление статуса игры
        function updateStatus() {
            if (currentPlayer === PLAYER) {
                statusElement.textContent = mustCapture ? 
                    'Вы должны побить шашку противника!' : 'Ваш ход';
                statusElement.className = 'status';
                rulesInfoElement.textContent = mustCapture ? 
                    'По правилам шашек, при возможности бить - вы обязаны это сделать' : 
                    'Вы можете ходить только по диагонали вперед';
            } else {
                statusElement.textContent = 'Ход компьютера...';
                statusElement.className = 'status thinking';
                rulesInfoElement.textContent = '';
            }
        }
        
        // Проверка, есть ли обязательные взятия для игрока
        function checkForcedCaptures(player) {
            const captureMoves = [];
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const piece = board[row][col];
                    if (piece !== EMPTY && piece.player === player) {
                        const moves = getCaptureMoves(row, col, player, []);
                        if (moves.length > 0) {
                            captureMoves.push(...moves.map(m => ({...m, fromRow: row, fromCol: col})));
                        }
                    }
                }
            }
            
            return captureMoves;
        }
        
        // Обработка клика по ячейке
        function handleCellClick(row, col) {
            // Если ход компьютера, игнорируем клик
            if (currentPlayer === AI) return;
            
            const piece = board[row][col];
            const forcedCaptures = checkForcedCaptures(PLAYER);
            mustCapture = forcedCaptures.length > 0;
            
            // Если кликнули на шашку игрока
            if (piece !== EMPTY && piece.player === PLAYER) {
                // Получаем допустимые ходы для этой шашки
                let movesForThisPiece = getValidMoves(row, col);
                
                // Если есть обязательные взятия, фильтруем только ходы со взятием
                if (mustCapture) {
                    movesForThisPiece = movesForThisPiece.filter(move => move.capture);
                    
                    // Проверяем, может ли эта конкретная шашка бить
                    const canThisPieceCapture = movesForThisPiece.length > 0;
                    if (!canThisPieceCapture) {
                        // Эта шашка не может бить, но другие могут - нельзя выбрать эту шашку
                        statusElement.textContent = 'Вы должны выбрать шашку, которая может бить!';
                        return;
                    }
                }
                
                if (movesForThisPiece.length > 0) {
                    // Выбираем шашку
                    selectedPiece = {row, col};
                    validMoves = movesForThisPiece;
                    renderBoard();
                    updateStatus();
                }
            }
            // Если кликнули на допустимый ход и есть выбранная шашка
            else if (selectedPiece && validMoves.some(move => move.toRow === row && move.toCol === col)) {
                // Находим соответствующий ход
                const move = validMoves.find(m => m.toRow === row && m.toCol === col);
                
                // Сохраняем состояние доски для возможности отмены хода
                moveHistory.push({
                    board: JSON.parse(JSON.stringify(board)),
                    currentPlayer: currentPlayer,
                    mustCapture: mustCapture
                });
                if (moveHistory.length > 10) moveHistory.shift(); // Ограничиваем историю
                
                // Выполняем ход
                makeMove(selectedPiece.row, selectedPiece.col, move);
                
                // Проверяем, есть ли продолжение взятия (множественное взятие)
                const furtherCaptures = getCaptureMoves(row, col, PLAYER, []);
                
                if (move.capture && furtherCaptures.length > 0) {
                    // Продолжаем взятие той же шашкой
                    selectedPiece = {row, col};
                    validMoves = furtherCaptures;
                    mustCapture = true;
                    updateStatus();
                } else {
                    // Сбрасываем выбор и передаем ход
                    selectedPiece = null;
                    validMoves = [];
                    mustCapture = false;
                    currentPlayer = AI;
                }
                
                renderBoard();
                
                // Если ход перешел к компьютеру
                if (currentPlayer === AI) {
                    updateStatus();
                    // Даем компьютеру подумать
                    setTimeout(makeAIMove, 800);
                }
            }
        }
        
        // Получение допустимых ходов для шашки
        function getValidMoves(row, col) {
            const piece = board[row][col];
            if (piece === EMPTY) return [];
            
            // Сначала проверяем ходы с захватом
            const captureMoves = getCaptureMoves(row, col, piece.player, []);
            
            // Если есть ходы с захватом, возвращаем только их
            if (captureMoves.length > 0) {
                return captureMoves;
            }
            
            // Если нет взятий, проверяем обычные ходы
            const moves = [];
            const directions = getMoveDirections(piece);
            
            for (const dir of directions) {
                const newRow = row + dir.row;
                const newCol = col + dir.col;
                
                if (isValidPosition(newRow, newCol) && board[newRow][newCol] === EMPTY) {
                    moves.push({fromRow: row, fromCol: col, toRow: newRow, toCol: newCol, capture: false});
                }
            }
            
            return moves;
        }
        
        // Получение направлений хода для шашки
        function getMoveDirections(piece) {
            if (piece.king) {
                // Дамка ходит в любом направлении
                return [
                    {row: -1, col: -1}, {row: -1, col: 1}, 
                    {row: 1, col: -1}, {row: 1, col: 1}
                ];
            } else {
                // Обычная шашка ходит только вперед
                return piece.player === PLAYER ? 
                    [{row: -1, col: -1}, {row: -1, col: 1}] : 
                    [{row: 1, col: -1}, {row: 1, col: 1}];
            }
        }
        
        // Рекурсивная функция для поиска ходов с захватом
        function getCaptureMoves(row, col, player, path) {
            const moves = [];
            const directions = [
                {row: -1, col: -1}, {row: -1, col: 1}, 
                {row: 1, col: -1}, {row: 1, col: 1}
            ];
            
            for (const dir of directions) {
                const jumpRow = row + dir.row;
                const jumpCol = col + dir.col;
                const landRow = row + 2 * dir.row;
                const landCol = col + 2 * dir.col;
                
                // Проверяем, можно ли сделать захват
                if (isValidPosition(jumpRow, jumpCol) && 
                    isValidPosition(landRow, landCol) &&
                    board[jumpRow][jumpCol] !== EMPTY &&
                    board[jumpRow][jumpCol].player !== player &&
                    board[landRow][landCol] === EMPTY &&
                    !path.some(p => p.row === landRow && p.col === landCol)) {
                    
                    // Для обычных шашек проверяем направление (только вперед, если не дамка)
                    const piece = board[row][col];
                    if (!piece.king) {
                        if (piece.player === PLAYER && dir.row > 0) continue; // Игрок может бить только вперед (вверх)
                        if (piece.player === AI && dir.row < 0) continue; // AI может бить только вперед (вниз)
                    }
                    
                    // Добавляем ход с захватом
                    const newPath = [...path, {row: landRow, col: landCol}];
                    moves.push({
                        fromRow: row, 
                        fromCol: col, 
                        toRow: landRow, 
                        toCol: landCol, 
                        capture: true,
                        captureRow: jumpRow,
                        captureCol: jumpCol
                    });
                    
                    // Проверяем возможность дальнейших захватов
                    const furtherMoves = getCaptureMoves(landRow, landCol, player, newPath);
                    moves.push(...furtherMoves.map(m => ({
                        ...m,
                        fromRow: row,
                        fromCol: col,
                        captureRow: jumpRow,
                        captureCol: jumpCol
                    })));
                }
            }
            
            return moves;
        }
        
        // Проверка валидности позиции
        function isValidPosition(row, col) {
            return row >= 0 && row < 8 && col >= 0 && col < 8;
        }
        
        // Выполнение хода
        function makeMove(fromRow, fromCol, move) {
            const piece = board[fromRow][fromCol];
            
            // Перемещаем шашку
            board[move.toRow][move.toCol] = piece;
            board[fromRow][fromCol] = EMPTY;
            
            // Если был захват, убираем шашку противника
            if (move.capture) {
                board[move.captureRow][move.captureCol] = EMPTY;
            }
            
            // Проверяем, стала ли шашка дамкой
            if (!piece.king) {
                if ((piece.player === PLAYER && move.toRow === 0) || 
                    (piece.player === AI && move.toRow === 7)) {
                    piece.king = true;
                }
            }
            
            // Проверяем условие победы
            checkGameEnd();
        }
        
        // Ход ИИ
        function makeAIMove() {
            // Проверяем обязательные взятия для ИИ
            const forcedCaptures = checkForcedCaptures(AI);
            mustCapture = forcedCaptures.length > 0;
            
            // Получаем все возможные ходы для ИИ
            const allMoves = [];
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const piece = board[row][col];
                    if (piece !== EMPTY && piece.player === AI) {
                        const moves = getValidMoves(row, col);
                        // Если есть обязательные взятия, фильтруем только их
                        const validMoves = mustCapture ? 
                            moves.filter(move => move.capture) : 
                            moves;
                        allMoves.push(...validMoves.map(move => ({...move, fromRow: row, fromCol: col})));
                    }
                }
            }
            
            if (allMoves.length === 0) {
                // Нет возможных ходов - игрок побеждает
                statusElement.textContent = 'Вы победили!';
                return;
            }
            
            // Сохраняем состояние доски для возможности отмены хода
            moveHistory.push({
                board: JSON.parse(JSON.stringify(board)),
                currentPlayer: currentPlayer,
                mustCapture: mustCapture
            });
            if (moveHistory.length > 10) moveHistory.shift();
            
            // Выбираем лучший ход
            const bestMove = findBestMove(3);
            
            // Выполняем ход
            makeMove(bestMove.fromRow, bestMove.fromCol, bestMove);
            
            // Проверяем, есть ли продолжение взятия
            const furtherCaptures = getCaptureMoves(bestMove.toRow, bestMove.toCol, AI, []);
            
            if (bestMove.capture && furtherCaptures.length > 0) {
                // Продолжаем взятие
                mustCapture = true;
                setTimeout(makeAIMove, 600); // Рекурсивно делаем следующий ход взятия
            } else {
                // Передаем ход игроку
                currentPlayer = PLAYER;
                mustCapture = false;
                updateStatus();
                renderBoard();
            }
        }
        
        // Остальной код (findBestMove, minimax, evaluateBoard и т.д.) остается без изменений
        // ... [остальной код без изменений] ...

        // Проверка окончания игры
        function checkGameEnd() {
            const playerPieces = countPieces(PLAYER);
            const aiPieces = countPieces(AI);
            const playerMoves = getAllMoves(PLAYER).length > 0;
            const aiMoves = getAllMoves(AI).length > 0;
            
            if (playerPieces === 0 || !playerMoves) {
                statusElement.textContent = 'Компьютер победил!';
                currentPlayer = EMPTY;
            } else if (aiPieces === 0 || !aiMoves) {
                statusElement.textContent = 'Вы победили!';
                currentPlayer = EMPTY;
            }
        }

        // Получение всех ходов для игрока
        function getAllMoves(player) {
            const allMoves = [];
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const piece = board[row][col];
                    if (piece !== EMPTY && piece.player === player) {
                        const moves = getValidMoves(row, col);
                        allMoves.push(...moves.map(move => ({...move, fromRow: row, fromCol: col})));
                    }
                }
            }
            return allMoves;
        }

        // Подсчет шашек игрока
        function countPieces(player) {
            let count = 0;
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const piece = board[row][col];
                    if (piece !== EMPTY && piece.player === player) {
                        count++;
                    }
                }
            }
            return count;
        }

        // Поиск лучшего хода для ИИ (упрощенная версия)
        function findBestMove(depth) {
            const allMoves = getAllMoves(AI);
            
            // Если есть ходы с захватом, предпочитаем их
            const captureMoves = allMoves.filter(move => move.capture);
            if (captureMoves.length > 0) {
                // Выбираем захват с максимальным количеством последующих захватов
                return captureMoves.reduce((best, move) => {
                    const score = evaluateCaptureMove(move);
                    return score > best.score ? {move, score} : best;
                }, {move: captureMoves[0], score: -Infinity}).move;
            }
            
            // Иначе выбираем случайный ход (упрощенная логика)
            return allMoves[Math.floor(Math.random() * allMoves.length)];
        }

        // Оценка хода с захватом
        function evaluateCaptureMove(move) {
            let score = 0;
            score += 10; // Базовый счет за захват
            
            // Дополнительные очки за превращение в дамку
            const piece = board[move.fromRow][move.fromCol];
            if (!piece.king) {
                if ((piece.player === AI && move.toRow === 0) || 
                    (piece.player === PLAYER && move.toRow === 7)) {
                    score += 5;
                }
            }
            
            return score;
        }

        // Обработчики кнопок
        restartButton.addEventListener('click', initGame);
        
        undoButton.addEventListener('click', () => {
            if (moveHistory.length > 0 && currentPlayer === PLAYER) {
                const previousState = moveHistory.pop();
                board = previousState.board;
                currentPlayer = previousState.currentPlayer;
                mustCapture = previousState.mustCapture;
                selectedPiece = null;
                validMoves = [];
                updateStatus();
                renderBoard();
            }
        });
        
        // Запуск игры при загрузке страницы
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
